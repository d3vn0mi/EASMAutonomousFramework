{% extends "base.html" %}
{% load i18n %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">{{ title|default:"asset_bulk_import" }}</h1>
<div class="bg-white shadow sm:rounded-lg p-6 max-w-2xl">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}<p class="mt-1 text-sm text-red-600">{{ error }}</p>{% endfor %}
        </div>
        {% endfor %}
        <button type="submit" class="rounded-md bg-raven-700 px-4 py-2 text-sm font-semibold text-white hover:bg-raven-600">{% trans "Save" %}</button>
    </form>
</div>
{% endblock %}
