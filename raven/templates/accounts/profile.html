{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Profile" %} - RAVEN EASM{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">{% trans "My Profile" %}</h1>
<div class="bg-white shadow sm:rounded-lg p-6 max-w-2xl">
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Username" %}</label>
            <p class="text-gray-900">{{ user.username }}</p>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Role" %}</label>
            <p class="text-gray-900">{{ user.get_role_display }}</p>
        </div>
        <div class="mb-4">
            <label for="language" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Language" %}</label>
            <select name="language" id="language" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-raven-500 focus:ring-raven-500 sm:text-sm py-2 px-3 border">
                <option value="en" {% if user.language == 'en' %}selected{% endif %}>English</option>
                <option value="el" {% if user.language == 'el' %}selected{% endif %}>Ελληνικά</option>
            </select>
        </div>
        <div class="mb-4">
            <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Phone" %}</label>
            <input type="text" name="phone" id="phone" value="{{ user.phone }}" class="block w-full rounded-md border-gray-300 shadow-sm sm:text-sm py-2 px-3 border">
        </div>
        <button type="submit" class="rounded-md bg-raven-700 px-4 py-2 text-sm font-semibold text-white hover:bg-raven-600">{% trans "Save" %}</button>
    </form>
</div>
{% endblock %}
